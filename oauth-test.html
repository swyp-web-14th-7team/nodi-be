<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OAuth 테스트 (Google)</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        max-width: 720px;
        margin: 40px auto;
        padding: 0 16px;
        color: #1a1a1a;
      }
      h1 {
        font-size: 20px;
      }
      .row {
        display: flex;
        gap: 8px;
        align-items: center;
        margin: 12px 0;
      }
      input[type='text'] {
        flex: 1;
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 6px;
      }
      button {
        padding: 10px 16px;
        border: 0;
        border-radius: 6px;
        background: #4285f4;
        color: #fff;
        font-size: 14px;
        cursor: pointer;
      }
      button.secondary {
        background: #555;
      }
      button:disabled {
        opacity: 0.5;
        cursor: default;
      }
      pre {
        background: #0d1117;
        color: #c9d1d9;
        padding: 14px;
        border-radius: 8px;
        overflow: auto;
        font-size: 13px;
        white-space: pre-wrap;
        word-break: break-all;
      }
      .badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 12px;
      }
      .ok {
        background: #d4edda;
        color: #155724;
      }
      .err {
        background: #f8d7da;
        color: #721c24;
      }
      label {
        font-size: 13px;
        color: #555;
      }
    </style>
  </head>
  <body>
    <h1>🔐 OAuth 테스트 (Google / Naver)</h1>

    <div class="row">
      <label style="width: 80px">API Base</label>
      <input id="apiBase" type="text" value="http://localhost:3000" />
    </div>

    <div class="row">
      <button id="loginBtn">① 구글 로그인 시작</button>
      <button id="naverBtn">① 네이버 로그인 시작</button>
      <button id="kakaoBtn">① 카카오 로그인 시작</button>
      <button id="refreshBtn">② 토큰 refresh</button>
      <button id="logoutBtn">③ 로그아웃</button>
      <button id="clearBtn" class="secondary">로그 지우기</button>
    </div>

    <div class="row">
      <label style="width: 80px">로그인 모드</label>
      <label style="display: flex; align-items: center; gap: 6px">
        <input id="adminMode" type="checkbox" style="cursor: pointer" />
        관리자 로그인 (ADMIN 계정만 성공 · /auth/login/admin)
      </label>
    </div>

    <div class="row">
      <label style="width: 80px">Access Token</label>
      <input
        id="accessToken"
        type="text"
        readonly
        placeholder="로그인/refresh 성공 시 표시"
      />
    </div>

    <p id="phase"></p>
    <pre id="log">대기 중…</pre>

    <script>
      const $ = (id) => document.getElementById(id);
      const apiBase = () => $('apiBase').value.replace(/\/+$/, '');

      // API Base 를 sessionStorage 에 저장해 OAuth 리다이렉트(페이지 새 로드) 후에도 유지
      // 탭 닫으면 자동 삭제되고, 아래 TTL(1시간)로 만료도 처리
      const API_BASE_TTL_MS = 60 * 60 * 1000; // 1시간
      const setApiBase = (value) => {
        const item = { value, expiresAt: Date.now() + API_BASE_TTL_MS };
        sessionStorage.setItem('apiBase', JSON.stringify(item));
      };
      const getApiBase = () => {
        const raw = sessionStorage.getItem('apiBase');
        if (!raw) return null;
        try {
          const { value, expiresAt } = JSON.parse(raw);
          if (Date.now() > expiresAt) {
            sessionStorage.removeItem('apiBase'); // 만료 → 삭제
            return null;
          }
          return value;
        } catch {
          return null;
        }
      };

      const savedApiBase = getApiBase();
      if (savedApiBase) $('apiBase').value = savedApiBase;
      $('apiBase').oninput = () => setApiBase($('apiBase').value);

      const log = (msg, obj) => {
        const time = new Date().toLocaleTimeString();
        const body =
          obj !== undefined ? '\n' + JSON.stringify(obj, null, 2) : '';
        $('log').textContent =
          `[${time}] ${msg}${body}\n\n` + $('log').textContent;
      };
      const phase = (html) => ($('phase').innerHTML = html);
      const setAccessToken = (t) => {
        if (t) $('accessToken').value = t;
      };

      // 쿠키(device_id, refresh_token) 기반 인증 엔드포인트 공통 호출
      const postAuth = async (path, phaseMsg) => {
        phase(phaseMsg);
        const res = await fetch(`${apiBase()}${path}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
        });
        let json = null;
        try {
          json = await res.json();
        } catch {
          /* 바디 없는 응답(로그아웃 등) 무시 */
        }
        log(`POST ${path} → ${res.status}`, json);
        return { res, json };
      };

      // ① 로그인 시작: 백엔드에서 인가 URL 받아 이동
      // provider: 'GOOGLE' | 'NAVER' — 엔드포인트는 소문자(/auth/google, /auth/naver)
      const startLogin = async (provider) => {
        try {
          const path = `/auth/${provider.toLowerCase()}`;
          phase(`${provider} 로그인 URL 요청 중…`);
          // 콜백은 같은 페이지로 돌아오므로, 어떤 provider 로 시작했는지 저장해둠
          sessionStorage.setItem('provider', provider);
          // 관리자 로그인 여부도 저장 → 콜백에서 교환 경로 결정
          sessionStorage.setItem('adminLogin', String($('adminMode').checked));

          const res = await fetch(`${apiBase()}${path}`, {
            method: 'GET',
            credentials: 'include', // device_id 쿠키 주고받기
          });
          const json = await res.json();
          log(`GET ${path} → ${res.status}`, json);

          // TransformInterceptor 래핑(data.url) / 비래핑(url) 둘 다 대응
          const url = json?.data?.url ?? json?.url;
          if (!url) throw new Error('응답에 url 이 없습니다');

          phase(`${provider} 로 이동합니다…`);
          window.location.href = url;
        } catch (e) {
          phase('<span class="badge err">실패</span>');
          log('로그인 시작 실패: ' + e.message);
        }
      };

      $('loginBtn').onclick = () => startLogin('GOOGLE');
      $('naverBtn').onclick = () => startLogin('NAVER');
      $('kakaoBtn').onclick = () => startLogin('KAKAO');

      // ② 토큰 refresh: 쿠키의 refresh_token 으로 accessToken/refreshToken 갱신
      $('refreshBtn').onclick = async () => {
        try {
          const { res, json } = await postAuth(
            '/auth/refresh',
            '토큰 refresh 요청 중…',
          );
          setAccessToken(json?.data?.accessToken ?? json?.accessToken);
          phase(
            res.ok
              ? '<span class="badge ok">refresh 성공</span>'
              : '<span class="badge err">refresh 실패 ' + res.status + '</span>',
          );
        } catch (e) {
          phase('<span class="badge err">요청 실패</span>');
          log('refresh 실패: ' + e.message);
        }
      };

      // ③ 로그아웃: 서버에서 refresh_token 폐기(revoke)
      $('logoutBtn').onclick = async () => {
        try {
          const { res } = await postAuth('/auth/logout', '로그아웃 요청 중…');
          if (res.ok) $('accessToken').value = '';
          phase(
            res.ok
              ? '<span class="badge ok">로그아웃 성공</span>'
              : '<span class="badge err">로그아웃 실패 ' +
                  res.status +
                  '</span>',
          );
        } catch (e) {
          phase('<span class="badge err">요청 실패</span>');
          log('로그아웃 실패: ' + e.message);
        }
      };

      $('clearBtn').onclick = () => ($('log').textContent = '대기 중…');

      // ③ 콜백 처리: provider 가 ?code&state(또는 ?error)로 이 페이지에 돌아옴
      (async function handleCallback() {
        const q = new URLSearchParams(location.search);
        const code = q.get('code');
        const state = q.get('state');
        const error = q.get('error');

        if (error) {
          phase('<span class="badge err">OAuth 에러</span>');
          log('provider 가 error 반환', {
            error,
            error_description: q.get('error_description'),
          });
          return;
        }
        if (!code) return; // 콜백이 아니라 그냥 첫 진입

        // 로그인 시작 시 저장해둔 provider (없으면 GOOGLE 기본)
        const provider = sessionStorage.getItem('provider') || 'GOOGLE';
        // 관리자 로그인으로 시작했으면 /auth/login/admin 으로 교환
        const isAdmin = sessionStorage.getItem('adminLogin') === 'true';
        const loginPath = isAdmin ? '/auth/login/admin' : '/auth/login';
        log('콜백 수신', {
          provider,
          admin: isAdmin,
          code: code.slice(0, 12) + '…',
          state,
        });
        phase(
          `백엔드로 ${provider}${isAdmin ? ' (관리자)' : ''} code 교환 요청 중…`,
        );

        try {
          const res = await fetch(`${apiBase()}${loginPath}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ provider, code, state }),
          });
          const json = await res.json();
          log(`POST ${loginPath} → ${res.status}`, json);
          setAccessToken(json?.data?.accessToken ?? json?.accessToken);
          const okLabel = isAdmin ? '관리자 로그인 성공' : '로그인 성공';
          const errLabel = isAdmin ? '관리자 로그인 실패 ' : '로그인 실패 ';
          phase(
            res.ok
              ? '<span class="badge ok">' + okLabel + '</span>'
              : '<span class="badge err">' + errLabel + res.status + '</span>',
          );
        } catch (e) {
          phase('<span class="badge err">요청 실패</span>');
          log('콜백 처리 실패: ' + e.message);
        } finally {
          // 새로고침 시 code 재사용(invalid_grant) 방지: 쿼리 제거
          history.replaceState({}, '', location.pathname);
          sessionStorage.removeItem('provider'); // 사용한 provider 정리
          sessionStorage.removeItem('adminLogin'); // 사용한 관리자 플래그 정리
        }
      })();
    </script>
  </body>
</html>
