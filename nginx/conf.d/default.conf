server {
    listen 80;
    server_name _;

    # Docker 내부 DNS 10초마다 갱신
    resolver 127.0.0.11 valid=10s;

    location / {
        # 활성 색(blue/green)을 가리키는 파일에서 $upstream 을 가져옴
        # 배포 스크립트가 이 파일만 교체하고 nginx reload → 무중단 전환
        include /etc/nginx/active/upstream.conf;
        proxy_pass http://$upstream;
        proxy_http_version 1.1;

        # 연결 실패/타임아웃 시 다음 IP 로 재시도
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
        proxy_next_upstream_timeout 10s;
        proxy_connect_timeout 5;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # nginx 가 생성하는 요청 ID 를 백엔드로 전달 (genReqId 가 이 헤더를 우선 사용)
        proxy_set_header X-Request-Id      $request_id;
    }
}
