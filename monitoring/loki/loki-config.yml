# Loki 단일 바이너리 구성 (single-binary)
# 규모가 작아 마이크로서비스 모드/오브젝트 스토리지 없이 로컬 파일시스템만 사용.
# 인증이 없으므로 호스트 포트로 절대 노출하지 말 것 (docker-compose.yml 에서 expose 만 사용).
auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  # Loki 자신의 로그는 warn 이상만 (info 로 두면 컴팩션 로그가 계속 쌓임)
  log_level: warn

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  # 단일 인스턴스이므로 복제 없음
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    # from 은 "이 스키마를 적용하기 시작할 날짜". 과거 날짜로 두면 모든 데이터에 적용됨.
    # 스키마를 바꿀 땐 이 항목을 수정하지 말고 미래 날짜로 새 항목을 추가해야 함.
    - from: 2020-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  # 보존 기간 14일 (compactor 가 실제 삭제를 수행)
  retention_period: 336h
  # 보존 기간이 지난 구간은 조회해도 결과가 없으므로 쿼리 범위도 동일하게 제한
  max_query_lookback: 336h
  # 보존 기간보다 오래된 로그는 어차피 지울 것이므로 받지 않음.
  # retention_period 와 같은 값으로 맞춰야 함. 이보다 짧게 잡으면 Alloy 가 처음 뜰 때
  # 기존 컨테이너의 과거 로그를 읽어 보내다가 거부당해 에러 로그가 쏟아짐.
  reject_old_samples: true
  reject_old_samples_max_age: 336h

compactor:
  working_directory: /loki/compactor
  delete_request_store: filesystem
  # 이 값이 false 면 retention_period 를 설정해도 로그가 영원히 안 지워짐
  retention_enabled: true
  retention_delete_delay: 2h
  compaction_interval: 10m

# Grafana 로 사용 통계 전송 끔
analytics:
  reporting_enabled: false