# Grafana 기동 시 Loki 데이터소스를 자동 등록 (UI 에서 수동 추가 불필요)
apiVersion: 1

datasources:
  - name: Loki
    type: loki
    # uid 를 고정해야 대시보드 JSON 이 데이터소스를 안정적으로 참조할 수 있음.
    # (지정 안 하면 Grafana 가 임의 uid 를 만들어 대시보드가 깨짐)
    uid: loki
    access: proxy
    # compose 내부 네트워크의 서비스명. Loki 는 호스트에 노출돼 있지 않음.
    url: http://loki:3100
    isDefault: true
    jsonData:
      maxLines: 1000
