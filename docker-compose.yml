services:
  backend:
    build: .
    container_name: be-server
    env_file:
      - .env
    expose:
      - "3000" # 호스트에 직접 노출하지 않음. nginx 만 통해 접근
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: be-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - backend
    restart: unless-stopped
